<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Tron Conversor MP4</title>

  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#00e5ff">

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00e5ff;
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    input[type="file"] {
      width: 100%;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      background: #00e5ff;
      border: none;
      color: #000;
      font-size: 20px;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #00cde0;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Tron<br>Conversor MP4</h1>

    <p>
      Converta vídeos para MP4 diretamente do navegador.<br>
      <strong>Simples • Rápido • Sem instalar</strong>
    </p>

    <form action="/convert" method="post" enctype="multipart/form-data">
      <input type="file" name="video" accept="video/*" required>
      <button type="submit">Converter para MP4</button>
    </form>

    <footer>
      © Tron MP4
    </footer>
  </div>

</body>
</html>
