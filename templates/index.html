<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tron Conversor MP4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #111;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 420px;
      padding: 30px 20px;
      text-align: center;
    }

    h1 {
      color: #00e5ff;
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    }

    input[type="file"] {
      width: 100%;
      margin: 15px 0;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #00e5ff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #9befff;
      cursor: not-allowed;
    }

    .preview {
      margin-top: 15px;
    }

    video, audio, img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    .status {
      margin-top: 15px;
      font-size: 14px;
    }

    .footer {
      margin-top: 30px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>Tron MP4</h1>
    <p>Converta vídeos, áudios ou imagens para MP4 diretamente do navegador.</p>

    <div class="card">
      <form id="uploadForm">
        <input 
          type="file" 
          id="fileInput" 
          name="file"
          accept="video/*,audio/*,image/*"
          required
        >

        <button type="submit" id="convertBtn">
          Converter para MP4
        </button>
      </form>

      <div class="preview" id="preview"></div>
      <div class="status" id="status"></div>
    </div>

    <div class="footer">
      © Tron MP4
    </div>
  </div>

  <script>
    const form = document.getElementById("uploadForm");
    const fileInput = document.getElementById("fileInput");
    const preview = document.getElementById("preview");
    const status = document.getElementById("status");
    const button = document.getElementById("convertBtn");

    fileInput.addEventListener("change", () => {
      preview.innerHTML = "";
      status.textContent = "";

      const file = fileInput.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);

      if (file.type.startsWith("video")) {
        preview.innerHTML = `<video controls src="${url}"></video>`;
      } 
      else if (file.type.startsWith("audio")) {
        preview.innerHTML = `<audio controls src="${url}"></audio>`;
      } 
      else if (file.type.startsWith("image")) {
        preview.innerHTML = `<img src="${url}">`;
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const file = fileInput.files[0];
      if (!file) return;

      button.disabled = true;
      status.textContent = "Convertendo... aguarde";

      const data = new FormData();
      data.append("file", file);

      try {
        const res = await fetch("/convert", {
          method: "POST",
          body: data
        });

        if (!res.ok) throw new Error("Erro na conversão");

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "tron_convertido.mp4";
        a.click();

        status.textContent = "Conversão concluída!";
      } catch (err) {
        status.textContent = "Erro ao converter arquivo.";
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
