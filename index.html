<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron Conversor — Emc³</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@300;400;500;700&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ── TOKENS DE DESIGN ────────────────────── */
        :root {
            --bg:        #070a10;
            --surface:   #0d1421;
            --surface2:  #111c2e;
            --border:    #1a2d47;
            --cyan:      #00e5ff;
            --purple:    #c026d3;
            --green:     #00e676;
            --red:       #ff1744;
            --gold:      #f59e0b;
            --gold2:     #fbbf24;
            --text:      #dce8f5;
            --muted:     #4a6880;
            --font-main: 'Space Grotesk', sans-serif;
            --font-head: 'Anton', sans-serif;
            --font-myst: 'Cinzel', serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 16px 80px;
            position: relative;
            overflow-x: hidden;
        }

        /* Grade de Fundo Neon */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,.02) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none; z-index: 0;
        }

        .wrapper {
            position: relative; z-index: 1;
            width: 100%; max-width: 480px;
            display: flex; flex-direction: column; gap: 20px;
        }

        /* ── HEADER ──────────────────────────────── */
        header { text-align: center; padding: 8px 0 20px; }
        .logo-title {
            font-family: var(--font-head);
            font-size: 42px; letter-spacing: 6px;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
        .logo-sub { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--muted); margin-top: 8px; }

        /* ── CARD CONVERSOR ──────────────────────── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 28px 24px;
            box-shadow: 0 24px 48px rgba(0,0,0,.5);
        }
        .section-tag { font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--cyan); margin-bottom: 12px; }
        
        .drop-zone {
            position: relative; border: 1.5px dashed var(--border);
            border-radius: 12px; padding: 20px; text-align: center;
            cursor: pointer; transition: all .2s; margin-bottom: 16px;
        }
        .drop-zone:hover { border-color: var(--cyan); background: rgba(0,229,255,.04); }
        .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        
        .btn-main {
            width: 100%; padding: 18px; border: none; border-radius: 12px;
            background: linear-gradient(90deg, var(--cyan), #0084b4);
            color: #000; font-family: var(--font-head); font-size: 20px;
            letter-spacing: 3px; cursor: pointer; transition: .25s;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,229,255,.3); }

        /* ── VITRINE DE VENDAS ───────────────────── */
        .sales-divider {
            width: 100%; margin: 30px 0;
            display: flex; align-items: center; gap: 15px;
        }
        .sales-divider::before, .sales-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent); }
        .sales-divider-text { font-family: var(--font-myst); color: var(--cyan); font-size: 10px; letter-spacing: 4px; text-transform: uppercase; }

        .sales-section-title {
            font-family: var(--font-myst); font-size: 12px; letter-spacing: 4px;
            color: var(--gold); text-align: center; margin-bottom: 20px; text-transform: uppercase;
        }

        .ebooks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .ebook-card {
            background: var(--surface2); border: 1px solid rgba(245,158,11,.2);
            border-radius: 16px; padding: 20px 15px; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            transition: .25s;
        }
        .ebook-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .ebook-title { font-family: var(--font-myst); font-size: 11px; color: var(--gold2); text-align: center; }
        .ebook-price { font-family: var(--font-head); color: var(--gold); font-size: 18px; }

        /* ── BOTÃO WHATSAPP RETANGULAR NEON ─────── */
        .wa-float-rect {
            position: fixed; bottom: 25px; right: 20px;
            background: linear-gradient(90deg, #25d366, #128c4a);
            color: #fff; padding: 12px 22px; border-radius: 12px;
            text-decoration: none; font-weight: 700; font-size: 13px;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 0 20px rgba(37,211,102,0.5);
            border: 1px solid #4fff8f; z-index: 1000;
            animation: tremor-neon 3s infinite ease-in-out;
        }

        @keyframes tremor-neon {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(37,211,102,0.5); }
            50% { transform: scale(1.05) rotate(1deg); box-shadow: 0 0 35px rgba(37,211,102,0.8); }
            55% { transform: scale(1.05) rotate(-1deg); }
        }

        /* ── FOOTER ──────────────────────────────── */
        footer { text-align: center; padding: 40px 0; border-top: 1px solid var(--border); margin-top: 40px; }
        .footer-logo { font-family: var(--font-myst); font-size: 20px; color: var(--cyan); margin-bottom: 10px; }
        .footer-links { display: flex; justify-content: center; gap: 20px; }
        .footer-links a { color: var(--muted); text-decoration: none; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }

    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="wrapper">
        <header>
            <div class="logo-title">TRON</div>
            <div class="logo-sub">Conversor Universal · Emc³</div>
        </header>

        <div class="card">
            <div class="section-tag">01. Mídia</div>
            <div class="drop-zone">
                <input type="file" id="inputImg" accept="image/*">
                <div style="font-size: 24px;">🖼️</div>
                <div style="font-size: 12px; font-weight: 700;">Selecionar Capa</div>
            </div>
            <div class="drop-zone">
                <input type="file" id="inputAud" accept="audio/*">
                <div style="font-size: 24px;">🎵</div>
                <div style="font-size: 12px; font-weight: 700;">Selecionar Áudio</div>
            </div>
            <button class="btn-main" onclick="alert('Iniciando Conversão Cósmica...')">GERAR VÍDEO</button>
        </div>

        <div class="sales-divider">
            <span class="sales-divider-text">✦ Portal Emc³ ✦</span>
        </div>

        <div class="sales-section">
            <div class="sales-section-title">E-books & Conhecimento</div>
            <div class="ebooks-grid">
                <a href="https://wa.me/c/5521964440418" target="_blank" class="ebook-card">
                    <span class="ebook-title">Numerologia Sagrada</span>
                    <span class="ebook-price">R$ 27</span>
                </a>
                <a href="https://wa.me/c/5521964440418" target="_blank" class="ebook-card">
                    <span class="ebook-title">Mapa Vibracional</span>
                    <span class="ebook-price">R$ 37</span>
                </a>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 10px;">
            <a href="https://linktr.ee/jonpadilha" target="_blank" style="background: var(--surface2); padding: 20px; border-radius: 15px; text-decoration: none; color: var(--text); border: 1px solid var(--border); text-align: center; font-family: var(--font-myst); font-size: 12px; letter-spacing: 2px;">
                🔗 ACESSAR MEU LINKTREE
            </a>
            <a href="https://www.tiktok.com/@jonpadilha369" target="_blank" style="background: #000; padding: 20px; border-radius: 15px; text-decoration: none; color: #fff; border: 1px solid #fe2c55; text-align: center; font-family: var(--font-myst); font-size: 12px; letter-spacing: 2px;">
                📱 VITRINE TIKTOK
            </a>
        </div>

        <footer>
            <div class="footer-logo">Emc³</div>
            <div class="footer-links">
                <a href="https://wa.me/c/5521964440418">WhatsApp</a>
                <a href="https://linktr.ee/jonpadilha">Projetos</a>
            </div>
        </footer>
    </div>

    <a href="https://wa.me/5521964440418?text=Olá!%20Vim%20pelo%20TRON." target="_blank" class="wa-float-rect">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.06 3.973L0 16l4.104-1.077A7.888 7.888 0 0 0 7.994 14.5c4.367 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326z"/>
        </svg>
        CONSULTORIA WHATSAPP
    </a>

    <script>
        // Lógica de Autoplay de Áudio (Willow Smith)
        // Navegadores exigem interação para tocar áudio.
        document.body.addEventListener('click', function() {
            const audio = document.getElementById('bgMusic');
            if (audio.paused) {
                audio.play().catch(e => console.log("Autoplay aguardando interação..."));
            }
        }, { once: true });
    </script>
</body>
</html>
